<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="viewport" content="user-scalable=no">
        <link rel="icon" href="icon/icon.png" type="image/png">
        <link rel="apple-touch-icon" href="icon/icon.png">
        <link rel="stylesheet" type="text/css" href="fonts/gamefont.css">
        
        <!-- Updated to the specific web distribution path to prevent 'require' errors -->
        <script src="https://unpkg.com/@discord/embedded-app-sdk@1.9.0/dist/index.js"></script>

        <script>
            // We use a helper to ensure 'discord' global is ready
            async function startDiscord() {
                // Wait for the Discord SDK to load with multiple retry attempts
                let attempts = 0;
                const maxAttempts = 10;
                
                while (typeof window.discord === 'undefined' && attempts < maxAttempts) {
                    console.log("Waiting for Discord SDK to load...");
                    await new Promise(resolve => setTimeout(resolve, 200));
                    attempts++;
                }

                try {
                    if (typeof window.discord === 'undefined') {
                        console.error("Discord SDK failed to load after retries");
                        return;
                    }
                    
                    // Initialize using the global 'discord' object provided by the CDN
                    const discordSdk = new window.discord.DiscordSDK("1451436398241513553");
                    
                    await discordSdk.ready();
                    console.log("SSIA: Vanguard Chronicles - Discord Activity Connected");
                    
                    // You can now use discordSdk.commands for authorization later
                } catch (error) {
                    console.error("Discord SDK failed to initialize:", error);
                }
            }

            // Delay startup to ensure all scripts are loaded
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', startDiscord);
            } else {
                startDiscord();
            }
        </script>

        <title>SSIA: Vanguard Chronicles</title>
    </head>
    <body style="background-color: black">
        <script type="text/javascript" src="js/libs/pixi.js"></script>
        <script type="text/javascript" src="js/libs/pixi-tilemap.js"></script>

        <script type="text/javascript" src="js/libs/fpsmeter.js"></script>
        <script type="text/javascript" src="js/libs/lz-string.js"></script>
        <script type="text/javascript" src="js/libs/iphone-inline-video.browser.js"></script>
        <script type="text/javascript" src="js/rpg_core.js"></script>
        <script type="text/javascript" src="js/rpg_managers.js"></script>
        <script type="text/javascript" src="js/rpg_objects.js"></script>
        <script type="text/javascript" src="js/rpg_scenes.js"></script>
        <script type="text/javascript" src="js/rpg_sprites.js"></script>
        <script type="text/javascript" src="js/rpg_windows.js"></script>
        <script type="text/javascript" src="js/plugins.js"></script>
        <script type="text/javascript" src="js/main.js"></script>
    </body>
</html>
