    <head>
        <meta charset="UTF-8">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="viewport" content="user-scalable=no">
        <link rel="icon" href="icon/icon.png" type="image/png">
        <link rel="apple-touch-icon" href="icon/icon.png">
        <link rel="stylesheet" type="text/css" href="fonts/gamefont.css">
        
        <!-- Discord Embedded App SDK -->
        <script>
            // Load Discord SDK dynamically with error handling
            function loadDiscordSDK() {
                return new Promise((resolve) => {
                    const script = document.createElement('script');
                    script.src = 'https://unpkg.com/@discord/embedded-app-sdk@1.9.0/dist/index.js';
                    script.async = true;
                    script.onload = () => {
                        console.log("Discord SDK script loaded successfully");
                        resolve(true);
                    };
                    script.onerror = () => {
                        console.error("Failed to load Discord SDK from CDN");
                        resolve(false);
                    };
                    document.head.appendChild(script);
                });
            }

            // Initialize Discord after SDK is ready
            async function startDiscord() {
                try {
                    // Load the Discord SDK
                    const sdkLoaded = await loadDiscordSDK();
                    
                    if (!sdkLoaded) {
                        console.warn("Discord SDK unavailable, continuing without it");
                        return;
                    }
                    
                    // Wait for the discord object to be available
                    let attempts = 0;
                    const maxAttempts = 15;
                    
                    while (typeof window.discord === 'undefined' && attempts < maxAttempts) {
                        console.log("Waiting for Discord SDK to initialize...");
                        await new Promise(resolve => setTimeout(resolve, 100));
                        attempts++;
                    }

                    if (typeof window.discord === 'undefined') {
                        console.warn("Discord SDK object not available after retries");
                        return;
                    }
                    
                    // Initialize using the global 'discord' object provided by the CDN
                    const discordSdk = new window.discord.DiscordSDK("1451436398241513553");
                    
                    await discordSdk.ready();
                    console.log("SSIA: Vanguard Chronicles - Discord Activity Connected");
                    
                } catch (error) {
                    console.error("Discord initialization error:", error);
                }
            }

            // Start Discord initialization when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', startDiscord);
            } else {
                startDiscord();
            }
        </script>

        <title>SSIA: Vanguard Chronicles</title>
    </head>
