<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="viewport" content="user-scalable=no">
        <link rel="icon" href="icon/icon.png" type="image/png">
        <link rel="apple-touch-icon" href="icon/icon.png">
        <link rel="stylesheet" type="text/css" href="fonts/gamefont.css">
        
        <!-- Discord Embedded App SDK (Local) -->
        <script type="text/javascript" src="js/libs/discord-sdk.js"></script>
        <script>
            // Discord OAuth Configuration
            const DISCORD_CLIENT_ID = "1451436398241513553";
            const DISCORD_REDIRECT_URI = "https://gamessiavc.tenstudiosbc.my.id/";
            // Using standard SDK scopes. Discord prefers rpc.activities.write for Embedded Apps
            const DISCORD_SCOPES = ["identify", "rpc", "rpc.activities.write"]; 
            
            // Get authorization code from URL
            function getAuthorizationCode() {
                const params = new URLSearchParams(window.location.search);
                return params.get('code');
            }

            // Detect if we're in Discord Activity context
            function isDiscordActivity() {
                return typeof window.discord !== 'undefined' && window.discordSdk === undefined;
            }

            // Initialize Discord (non-blocking, works in both Discord Activity and normal browser)
            async function initializeDiscord() {
                try {
                    const authCode = getAuthorizationCode();
                    
                    // If we have an auth code from the external link, clean the URL immediately to prevent scope looping
                    if (authCode) {
                        localStorage.setItem('discord_auth_code', authCode);
                        window.history.replaceState({}, document.title, DISCORD_REDIRECT_URI);
                        console.log("Browser OAuth Code captured and URL cleaned.");
                    }
                    
                    // Check if Discord SDK is available
                    if (typeof window.discord !== 'undefined') {
                        const discordSdk = new window.discord.DiscordSDK(DISCORD_CLIENT_ID);
                        
                        await discordSdk.ready();
                        console.log("SSIA: Vanguard Chronicles - Discord SDK Ready");

                        // For Discord Activity context - Request Permissions
                        if (isDiscordActivity() || document.referrer.includes('discord.com')) {
                            console.log("Running in Discord Activity context. Requesting scopes...");
                            
                            try {
                                // This triggers the Authorize popup inside Discord
                                const auth = await discordSdk.commands.authenticate({
                                    scope: DISCORD_SCOPES,
                                });
                                
                                console.log("Authentication Successful! Access Token Acquired.");
                                
                                // Optional: Fetch user data to prove it works
                                const userResponse = await fetch(`https://discord.com/api/v10/users/@me`, {
                                    headers: {
                                        Authorization: `Bearer ${auth.access_token}`,
                                        'Content-Type': 'application/json',
                                    },
                                });
                                
                                if (userResponse.ok) {
                                    const user = await userResponse.json();
                                    console.log(`Welcome to SSIA, ${user.username}!`);
                                    // You can store this in a global variable for RPG Maker to use later
                                    window.discordUser = user; 
                                }

                            } catch (authError) {
                                console.warn("Discord Scope/Auth Error. Make sure boxes are checked in Developer Portal:", authError);
                            }
                        } else {
                            console.log("Running in normal browser context. Waiting for player to start.");
                        }
                        
                        window.discordSdk = discordSdk;
                    } else {
                        console.log("Discord SDK not available - running in normal browser mode");
                    }
                } catch (error) {
                    console.warn("Discord initialization warning:", error.message);
                    // Continue anyway - don't block the game from loading
                }
            }

            // Initialize Discord after a short delay (non-blocking for game)
            setTimeout(() => {
                initializeDiscord();
            }, 1000);
        </script>

        <title>SSIA: Vanguard Chronicles</title>
    </head>
    <body style="background-color: black">
        <script type="text/javascript" src="js/libs/pixi.js"></script>
        <script type="text/javascript" src="js/libs/pixi-tilemap.js"></script>
        <script type="text/javascript" src="js/libs/pixi-picture.js"></script>
        <script type="text/javascript" src="js/libs/fpsmeter.js"></script>
        <script type="text/javascript" src="js/libs/lz-string.js"></script>
        <script type="text/javascript" src="js/libs/iphone-inline-video.browser.js"></script>
        <script type="text/javascript" src="js/rpg_core.js"></script>
        <script type="text/javascript" src="js/rpg_managers.js"></script>
        <script type="text/javascript" src="js/rpg_objects.js"></script>
        <script type="text/javascript" src="js/rpg_scenes.js"></script>
        <script type="text/javascript" src="js/rpg_sprites.js"></script>
        <script type="text/javascript" src="js/rpg_windows.js"></script>
        <script type="text/javascript" src="js/plugins.js"></script>
        <script type="text/javascript" src="js/main.js"></script>
    </body>
</html>
